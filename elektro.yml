overwrite: true
schema:
  "http://jhnnsrs-lab/elektro/schema":
    handleAsSDL: true
documents: "graphql/elektro/**/*.graphql"
generates:
  src/renderer/src/elektro/api/fragments.ts:
    plugins:
      - "fragment-matcher"
  src/renderer/src/elektro/api/graphql.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
    config:
      withHooks: true
      reactApolloVersion: 3
      apolloReactHooksImportFrom: "@/lib/elektro/funcs"
      scalars:
        # Pint-like quantity scalars: unit-bearing strings ("100 ms", "1 µm").
        # Mapped to named types in ./scalars.ts so generated fields read as
        # `Duration`/`Length`/… rather than `any`. Parse via lib/quantities.ts.
        Duration: "@/elektro/api/scalars#Duration"
        Length: "@/elektro/api/scalars#Length"
        ElectricPotential: "@/elektro/api/scalars#ElectricPotential"
        ElectricalConductance: "@/elektro/api/scalars#ElectricalConductance"
        Frequency: "@/elektro/api/scalars#Frequency"
        Concentration: "@/elektro/api/scalars#Concentration"
        Resistivity: "@/elektro/api/scalars#Resistivity"
        SpecificCapacitance: "@/elektro/api/scalars#SpecificCapacitance"
        Temperature: "@/elektro/api/scalars#Temperature"
        # Dimension-free quantity metadata scalars: a value of any dimension
        # (GenericQuantity, e.g. "0.12 S/cm2"), a unit symbol (Unit, "mV") and a
        # pint dimensionality string (Dimension, "[length]"). Back the grounded
        # mechanism-parameter system.
        GenericQuantity: "@/elektro/api/scalars#GenericQuantity"
        Unit: "@/elektro/api/scalars#Unit"
        Dimension: "@/elektro/api/scalars#Dimension"

  src/renderer/src/elektro/graphql.schema.json:
    plugins:
      - "introspection"


  graphql/schemas/elektro.graphql:
    plugins:
      - schema-ast

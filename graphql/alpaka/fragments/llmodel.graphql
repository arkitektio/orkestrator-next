fragment LLMModel on LLMModel {
  id
  modelId
  llmString
  provider {
    ...Provider
  }
  features
  embedderFor {
    id
    name
  }
  inputModalities
  outputModalities
}

fragment ListLLMModel on LLMModel {
  id
  modelId
  llmString
  features
  inputModalities
  outputModalities
  provider {
    id
    name
    kind
  }
  embedderFor {
    id
    name
  }
}

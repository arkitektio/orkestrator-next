fragment Dataset on Dataset {
  id
  name
  description
  provenanceEntries {
    ...ProvenanceEntry
  }
  traces {
    ...ListTrace
  }
  files {
    ...ListFile
  }
  children {
    ...ListDataset
  }
  isDefault
  pinned
  createdAt
  creator {
    sub
  }
  tags
}

fragment ListDataset on Dataset {
  id
  name
  description
  isDefault
}

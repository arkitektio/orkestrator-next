fragment Parameter on Parameter {
  key
  label
  kind
  description
  default
  nullable
  referenceUnit
  proposedUnits
  dimension
}

fragment Mechanism on Mechanism {
  id
  name
  description
  parameters {
    ...Parameter
  }
}

fragment ListMechanism on Mechanism {
  id
  name
  parameters {
    ...Parameter
  }
}

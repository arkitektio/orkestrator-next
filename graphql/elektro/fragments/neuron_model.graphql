fragment Coord on Coord {
  x
  y
  z
}

fragment Section on Section {
  id
  diam
  length
  category
  nseg
  coords {
    ...Coord
  }
  parent {
    ...Connection
  }
}

fragment Connection on Connection {
  parent
  parentLocation
  childEnd
}

fragment Compartment on Compartment {
  id
  mechanisms
  globalParams {
    param
    value
    description
  }
  sectionParams {
    mechanism
    param
    distribution {
      value
    }
    description
  }
}

fragment ProvenanceEntry on ProvenanceEntry {
  id
  task {
    id
    taskId
    assigner {
      sub
    }
  }
  kind
  user {
    sub
  }
  client {
    clientId
  }
  date
  effectiveChanges {
    field
  }
}

fragment DetailNeuronModel on NeuronModel {
  id
  name
  config {
    temperature
    vInit
    label
    cells {
      id
      biophysics {
        compartments {
          ...Compartment
        }
      }
      topology {
        sections {
          ...Section
        }
      }
    }
  }
  description
  comparisons {
    collection {
      id
      name
    }
    changes {
      type
      path
      valueA
      valueB
    }
  }
  simulations {
    ...ListSimulation
  }
  environment {
    ...ModEnvironment
  }
  provenanceEntries {
    ...ProvenanceEntry
  }
}

fragment ListNeuronModel on NeuronModel {
  id
  name
}

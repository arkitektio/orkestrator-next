fragment Coord on Coord {
  x
  y
  z
}

fragment Section on Section {
  id
  diam
  length
  category
  nseg
  ra
  cm
  dLambda
  coords {
    ...Coord
  }
  parent {
    ...Connection
  }
}

fragment Connection on Connection {
  parent
  parentLocation
  childEnd
}

fragment SectionDominance on SectionDominance {
  cellId
  sectionId
  category
  globalScore
  conductanceLoad
  electrotonicDistance
}

fragment Ion on Ion {
  ion
  style
  reversalPotential
  internalConcentration
  externalConcentration
}

fragment MechanismGlobalParam on MechanismGlobalParam {
  mechanism
  param
  value
  description
}

fragment Compartment on Compartment {
  id
  color
  mechanisms
  ions {
    ...Ion
  }
  sectionParams {
    mechanism
    param
    distribution {
      value
    }
    description
  }
}

fragment ProvenanceEntry on ProvenanceEntry {
  id
  task {
    id
    taskId
    assigner {
      sub
    }
  }
  kind
  user {
    sub
  }
  client {
    clientId
  }
  date
  effectiveChanges {
    field
  }
}

fragment DetailNeuronModel on NeuronModel {
  id
  name
  config {
    temperature
    vInit
    label
    ra
    cm
    ions {
      ...Ion
    }
    mechanismGlobals {
      ...MechanismGlobalParam
    }
    cells {
      id
      biophysics {
        compartments {
          ...Compartment
        }
      }
      topology {
        sections {
          ...Section
        }
      }
    }
    netSynapses {
      id
      cell
      location
      position
      ... on Exp2Synapse {
        tau1
        tau2
        e
        delay
      }
    }
    netStimulators {
      id
      interval
      number
      start
    }
    netConnections {
      id
      delay
      weight
      threshold
      ... on SynapticConnection {
        netStimulator
        synapse
      }
    }
  }
  sectionDominance {
    ...SectionDominance
  }
  description
  comparisons {
    collection {
      id
      name
    }
    changes {
      type
      path
      valueA
      valueB
    }
  }
  simulations {
    ...ListSimulation
  }
  environment {
    ...ModEnvironment
  }
  provenanceEntries {
    ...ProvenanceEntry
  }
}

fragment ListNeuronModel on NeuronModel {
  id
  name
}

query DetailModelCollection($id: ID!) {
  modelCollection(id: $id) {
    ...ModelCollection
  }
}

query ListModelCollections(
  $pagination: OffsetPaginationInput
  $filters: ModelCollectionFilter
  $ordering: [ModelCollectionOrder!]
) {
  modelCollections(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListModelCollection
  }
}
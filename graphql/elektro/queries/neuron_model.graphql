query DetailNeuronModel($id: ID!) {
  neuronModel(id: $id) {
    ...DetailNeuronModel
  }
}

query SectionDominance(
  $id: ID!
  $weightAxial: Float
  $weightCapacitance: Float
  $weightConductance: Float
) {
  neuronModel(id: $id) {
    id
    sectionDominance(
      weightAxial: $weightAxial
      weightCapacitance: $weightCapacitance
      weightConductance: $weightConductance
    ) {
      ...SectionDominance
    }
  }
}

query ListNeuronModels(
  $pagination: OffsetPaginationInput
  $filters: NeuronModelFilter
  $ordering: [NeuronModelOrder!]
) {
  neuronModels(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListNeuronModel
  }
}

query DetailRecording($id: ID!) {
  recording(id: $id) {
    ...DetailRecording
  }
}

query ListRecordings(
  $pagination: OffsetPaginationInput
  $filters: RecordingFilter
  $ordering: [RecordingOrder!]
) {
  recordings(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListRecording
  }
}
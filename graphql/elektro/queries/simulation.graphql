query DetailSimulation($id: ID!) {
  simulation(id: $id) {
    ...DetailSimulation
  }
}

query ListSimulations(
  $pagination: OffsetPaginationInput
  $filters: SimulationFilter
  $ordering: [SimulationOrder!]
) {
  simulations(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListSimulation
  }
}

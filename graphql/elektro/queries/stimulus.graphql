query DetailStimulus($id: ID!) {
  stimulus(id: $id) {
    ...DetailStimulus
  }
}

query ListStimuli(
  $pagination: OffsetPaginationInput
  $filters: StimulusFilter
  $ordering: [StimulusOrder!]
) {
  stimuli(pagination: $pagination, filters: $filters, ordering: $ordering) {
    ...ListStimulus
  }
}
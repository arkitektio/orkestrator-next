fragment FlussStringAssignWidget on StringAssignWidget {
  __typename
  kind
  placeholder
  asParagraph
}

fragment FlussSliderAssignWidget on SliderAssignWidget {
  __typename
  kind
  min
  max
}

fragment FlussSearchAssignWidget on SearchAssignWidget {
  __typename
  kind
  query
  ward
}

fragment FlussCustomAssignWidget on CustomAssignWidget {
  __typename
  ward
  hook
}

fragment FlussChoiceAssignWidget on ChoiceAssignWidget {
  __typename
  kind
  choices {
    value
    label
    description
  }
}

fragment FlussAssignWidget on AssignWidget {
  __typename
  kind
  ...FlussStringAssignWidget
  ...FlussSearchAssignWidget
  ...FlussSliderAssignWidget
  ...FlussChoiceAssignWidget
  ...FlussCustomAssignWidget
}

fragment FlussArgChildPortNested on ArgPort {
  __typename
  key
  kind
  identifier
  children {
    key
    kind
    identifier
    widget {
      ...FlussAssignWidget
    }
  }
  widget {
    ...FlussAssignWidget
  }
  nullable
}
fragment FlussReturnChildPortNested on ReturnPort {
  __typename
  key
  kind
  identifier
  children {
    key
    kind
    identifier
    widget {
      ...FlussReturnWidget
    }
  }
  widget {
    ...FlussReturnWidget
  }
  nullable
}

fragment FlussArgChildPort on ArgPort {
  __typename
  kind
  identifier
  key
  children {
    ...FlussArgChildPortNested
  }
  widget {
    ...FlussAssignWidget
  }
  nullable
}
fragment FlussReturnChildPort on ReturnPort {
  __typename
  kind
  identifier
  key
  children {
    ...FlussReturnChildPortNested
  }
  widget {
    ...FlussReturnWidget
  }
  nullable
}

fragment FlussCustomEffect on CustomEffect {
  __typename
  kind
  hook
  ward
}

fragment FlussMessageEffect on MessageEffect {
  __typename
  kind
  message
}

fragment FlussPortEffect on Effect {
  __typename
  kind
  dependencies
  ...FlussCustomEffect
  ...FlussMessageEffect
}

fragment FlussAssignWidget on AssignWidget {
  __typename
  kind
  ...FlussStringAssignWidget
  ...FlussSearchAssignWidget
  ...FlussSliderAssignWidget
  ...FlussChoiceAssignWidget
  ...FlussCustomAssignWidget
}

fragment Validator on Validator {
  function
  dependencies
}

fragment FlussArgPort on ArgPort {
  __typename
  key
  label
  nullable
  description
  effects {
    ...FlussPortEffect
  }
  widget {
    ...FlussAssignWidget
  }
  choices {
    label
    value
    description
  }
  kind
  identifier
  children {
    ...FlussArgChildPort
  }
  default
  nullable
  validators {
    ...Validator
  }
  requires {
    key
    operator
    value
  }
}

fragment FlussReturnPort on ReturnPort {
  __typename
  key
  label
  nullable
  description
  effects {
    ...FlussPortEffect
  }
  widget {
    ...FlussReturnWidget
  }
  choices {
    label
    value
    description
  }
  kind
  identifier
  children {
    ...FlussReturnChildPort
  }
  provides {
    key
    operator
    value
  }
  default
  nullable
}

fragment FlussCustomReturnWidget on CustomReturnWidget {
  __typename
  kind
  hook
  ward
}

fragment FlussChoiceReturnWidget on ChoiceReturnWidget {
  __typename
  choices {
    label
    value
    description
  }
}

fragment FlussReturnWidget on ReturnWidget {
  __typename
  kind
  ...FlussCustomReturnWidget
  ...FlussChoiceReturnWidget
}

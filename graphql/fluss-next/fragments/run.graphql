fragment RunEvent on RunEvent {
  id
  source
  handle
  kind
  createdAt
  exception
  value
  t
  causedBy
}

fragment Snapshot on Snapshot {
  id
  run {
    id
    taskId
  }
  status
  events {
    ...RunEvent
  }
  t
}

fragment ListSnapshot on Snapshot {
  id
  run {
    id
    taskId
  }
  t
}

fragment DetailRun on Run {
  id
  taskId
  snapshots {
    id
    status
    t
    createdAt
  }
  createdAt
  latestSnapshot {
    createdAt
    events {
      ...RunEvent
    }
    t
  }
  status
  flow {
    ...Flow
  }
}

fragment ListRun on Run {
  id
  taskId
  createdAt
  status
  flow {
    workspace {
      title
    }
  }
}

fragment CarouselRun on Run {
  id
  taskId
  snapshots {
    id
    status
    t
    createdAt
  }
  createdAt
  latestSnapshot {
    createdAt
    events {
      ...RunEvent
    }
    t
  }
  status
  flow {
    ...Flow
  }
}

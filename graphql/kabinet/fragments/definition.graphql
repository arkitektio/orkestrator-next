fragment Definition on Definition {
  id
  name
  hash
  description
  args {
    ...ArgPort
  }
  returns {
    ...ReturnPort
  }
  flavours {
    ...ListFlavour
  }
}

fragment ListDefinition on Definition {
  id
  name
  hash
  description
  flavours {
    id
    name
    release {
      id
      version
      app {
        identifier
      }
    }
  }
}

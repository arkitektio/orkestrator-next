fragment StringAssignWidget on StringAssignWidget {
  __typename
  kind
  placeholder
  asParagraph
}

fragment SliderAssignWidget on SliderAssignWidget {
  __typename
  kind
  min
  max
  step
}

fragment StateChoiceAssignWidget on StateChoiceAssignWidget {
  __typename
  kind
  statePath
  stateAccessors {
    optionKey
    subPath
  }
  dependency
}

fragment FilterPort on ArgPort {
  __typename
  kind
  key
  identifier
  widget {
    ... on SearchAssignWidget {
      query
    }
  }
  description
  nullable
}

fragment SearchAssignWidget on SearchAssignWidget {
  __typename
  kind
  query
  ward
  filters {
    ...FilterPort
  }
  dependencies
}

fragment CustomAssignWidget on CustomAssignWidget {
  __typename
  ward
  hook
}

fragment ChoiceAssignWidget on ChoiceAssignWidget {
  __typename
  kind
  choices {
    value
    label
    description
  }
}

fragment ArgChildPortNested on ArgPort {
  __typename
  kind
  key
  identifier
  children {
    kind
    identifier
    widget {
      ...AssignWidget
    }
  }
  choices {
    value
    label
    description
  }
  widget {
    ...AssignWidget
  }
  description
  nullable
}

fragment ArgChildPort on ArgPort {
  __typename
  kind
  key
  identifier
  children {
    ...ArgChildPortNested
  }
  widget {
    ...AssignWidget
  }
  choices {
    value
    label
    description
  }
  nullable
  description
}

fragment ReturnChildPortNested on ReturnPort {
  __typename
  kind
  key
  identifier
  children {
    kind
    identifier
    widget {
      ...ReturnWidget
    }
  }
  choices {
    value
    label
    description
  }
  widget {
    ...ReturnWidget
  }
  description
  nullable
}


fragment ReturnChildPort on ReturnPort {
  __typename
  kind
  key
  identifier
  children {
    ...ReturnChildPortNested
  }
  widget {
    ...ReturnWidget
  }
  choices {
    value
    label
    description
  }
  nullable
  description
}

fragment BaseEffect on Effect {
  __typename
  kind
  dependencies
  function
}

fragment CustomEffect on CustomEffect {
  ...BaseEffect
  __typename
  kind
  hook
  ward
}

fragment MessageEffect on MessageEffect {
  ...BaseEffect
  __typename
  kind
  message
}

fragment HideEffect on HideEffect {
  ...BaseEffect
  __typename
  fade
}

fragment PortEffect on Effect {
  ...CustomEffect
  ...MessageEffect
  ...HideEffect
}

fragment AssignWidget on AssignWidget {
  __typename
  kind
  ...StringAssignWidget
  ...SearchAssignWidget
  ...SliderAssignWidget
  ...ChoiceAssignWidget
  ...CustomAssignWidget
  ...StateChoiceAssignWidget
}

fragment Validator on Validator {
  function
  dependencies
  label
  errorMessage
}

fragment ArgPort on ArgPort {
  __typename
  key
  label
  nullable
  description
  effects {
    ...PortEffect
  }
  widget {
    ...AssignWidget
  }
  kind
  identifier
  children {
    ...ArgChildPort
  }
  choices {
    value
    label
    description
  }
  default
  nullable
  validators {
    ...Validator
  }
}

fragment ReturnPort on ReturnPort {
  __typename
  key
  label
  nullable
  description
  effects {
    ...PortEffect
  }
  widget {
    ...ReturnWidget
  }
  kind
  identifier
  children {
    ...ReturnChildPort
  }
  choices {
    value
    label
    description
  }
  default
  nullable
  provides {
    key
    operator
    value
  }
}


fragment CustomReturnWidget on CustomReturnWidget {
  __typename
  kind
  hook
  ward
}

fragment ChoiceReturnWidget on ChoiceReturnWidget {
  __typename
  choices {
    label
    value
    description
  }
}

fragment ReturnWidget on ReturnWidget {
  __typename
  kind
  ...CustomReturnWidget
  ...ChoiceReturnWidget
}


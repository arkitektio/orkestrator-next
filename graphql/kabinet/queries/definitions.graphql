query GetDefinition($id: ID!) {
  definition(id: $id) {
    ...Definition
  }
}

query ListDefinitions {
  definitions {
    ...ListDefinition
  }
}

query PrimaryDefinitions(
  $pagination: OffsetPaginationInput
  $identifier: String
  $search: String
  $ordering: [DefinitionOrder!]
) {
  definitions(
    ordering: $ordering
    pagination: $pagination
    filters: {
      demands: [
        {
          kind: ARGS
          matches: [{ at: 0, kind: STRUCTURE, identifier: $identifier }]
        }
      ]
      search: $search
    }
  ) {
    ...ListDefinition
  }
}

query AllPrimaryDefinitions(
  $pagination: OffsetPaginationInput
  $filters: DefinitionFilter
  $ordering: [DefinitionOrder!]
) {
  definitions(ordering: $ordering, pagination: $pagination, filters: $filters) {
    ...ListDefinition
  }
}

query ListMaterializedStructureRelationEdges(
  $filters: MaterializedStructureRelationEdgeFilter
  $pagination: OffsetPaginationInput
  $ordering: [MaterializedStructureRelationEdgeOrder!]
) {
  materializedStructureRelationEdges(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...ListMaterializedStructureRelationEdge
  }
}

query GetMaterializedStructureRelationEdge($id: ID!) {
  materializedStructureRelationEdge(id: $id) {
    ...MaterializedStructureRelationEdge
  }
}

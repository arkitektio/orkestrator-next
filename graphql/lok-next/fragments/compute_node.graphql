fragment DetailComputeNode on ComputeNode {
  id
  name
  nodeId
  clients {
    ...ListClient
  }
  deviceGroups {
    ...ListDeviceGroup
  }
}
fragment DetailDevice on ComputeNode {
  id
  name
  nodeId
  deviceGroups {
    ...ListDeviceGroup
  }
}

fragment ListComputeNode on ComputeNode {
  id
  name
  nodeId
}

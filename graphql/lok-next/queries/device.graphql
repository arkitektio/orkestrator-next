query ListDevices(
  $pagination: OffsetPaginationInput
  $filters: DeviceFilter
) {
  devices(pagination: $pagination, filters: $filters) {
    ...ListDevice
  }
}

query GetDevice($id: ID!) {
  device(id: $id) {
    ...DetailDevice
  }
}


query GetDeviceByDeviceId($id: ID!) {
  deviceByDeviceId(id: $id) {
    ...DetailDevice
  }
}

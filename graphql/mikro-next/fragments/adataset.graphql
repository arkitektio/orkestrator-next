# One pyramid level of an array dataset: its own voxel (ARRAY) coordinate
# system plus the edge that maps it into the dataset's intrinsic pixel grid.
fragment DataArray on DataArray {
  id
  level
  shape
  chunkShape
  coordinateSystem {
    ...ListCoordinateSystem
  }
  toParent {
    ...Transformation
  }
  store {
    ...ZarrStore
  }
}

fragment ListADataset on ADataset {
  id
  name
  description
  axisNames
  shape
  multiscale
  # What the dataset structurally is — derived server-side from the intrinsic
  # system's axes. Cheap (no nested selection) and it is what a card leads with,
  # so it belongs on the list fragment rather than a second round trip.
  spec
  # A picture of a scene that places this dataset and nothing else — null
  # whenever every scene it sits in also holds other data, so most datasets will
  # not have one and the card cannot lean on it.
  latestSnapshot {
    ...SceneSnapshot
  }
}

fragment ADataset on ADataset {
  id
  name
  description
  axisNames
  shape
  multiscale
  # The structural pixel grid: the space ROIs resolve against and every level
  # and lens maps into.
  intrinsicSystem {
    ...CoordinateSystem
  }
  # The calibrated physical spaces derived from it — zero or many.
  calibrations {
    ...CoordinateSystem
  }
  dataArrays {
    ...DataArray
  }
}

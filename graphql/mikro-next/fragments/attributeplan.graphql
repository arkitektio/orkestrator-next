# One executable answer to "what is under this point?" — the read side of a
# FIELD edge. The server returns instructions (which array to sample, which
# parquet to query), never values, credentials, or coordinates: the same plan
# serves every probed point, so it is fetched once and executed locally.

# A column as the lookup returns it. `references` is a declared foreign key:
# the target table is keyed by its single INDEX coordinate column, and we
# select enough of it (store + columns) to run the one-hop follow-up lookup
# without another GraphQL round-trip.
fragment AttributePlanColumn on TableDatasetColumn {
  id
  name
  longName
  dtype
  role
  axisType
  unit
  references {
    id
    name
    store {
      ...ParquetStore
    }
    columns {
      id
      name
      dtype
      role
      axisType
    }
  }
}

fragment AttributePlan on AttributePlan {
  # The FIELD edge the plan was built from. Its (id, version) — together with
  # every path step's — is the plan's only staleness vector: parquet contents
  # changing never stales a plan.
  edge {
    id
    version
  }
  table {
    id
    name
  }
  # Steps from the PROBED system to the plan's root; compose in order,
  # inverting flagged steps (the pathToWorld contract). `version` is added on
  # top of the shared Transformation fragment because it joins the cache key.
  path {
    transformation {
      ...Transformation
      version
    }
    inverted
  }
  sample {
    # `consumes` is stated in this system's axis order — its axes give the
    # dimension order of the zarr array being indexed.
    system {
      id
      name
      axes {
        id
        name
        order
        type
      }
    }
    store {
      ...ZarrStore
    }
    consumes
    produces
    passthrough
  }
  lookup {
    store {
      ...ParquetStore
    }
    # Bind order: parquet path first (the read_parquet(?) argument), then these
    # key values in order.
    keyColumns {
      axis
      column {
        ...AttributePlanColumn
      }
    }
    attributes {
      ...AttributePlanColumn
    }
    sql
  }
}

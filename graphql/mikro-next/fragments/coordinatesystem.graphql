fragment Axis on Axis {
  id
  order
  name
  type
  unit
  longName
}

fragment ListCoordinateSystem on CoordinateSystem {
  id
  name
  kind
}

fragment CoordinateSystem on CoordinateSystem {
  id
  name
  kind
  axes {
    ...Axis
  }
}

# The concrete per-kind payload of a transformation edge, WITHOUT recursing
# into composite children — the leaf selection shared by every nesting depth
# in the Transformation fragment below.
#
# `inputAxes`/`outputAxes` are the SELF-DESCRIBED axis order of the edge's
# parameters (scale/translation/affine columns follow inputAxes) — the reason
# the scene fragment no longer needs to ship every coordinate system's axes.
fragment LeafTransformation on Transformation {
  __typename
  id
  kind
  name
  inputAxes
  outputAxes
  input {
    id
    name
  }
  output {
    id
    name
  }
  ... on ScaleTransformation {
    scale
  }
  ... on TranslationTransformation {
    translation
  }
  ... on AffineTransformation {
    affine
  }
  ... on RotationTransformation {
    affine
  }
  # The displacement field itself now arrives as the store, not a bare id, so
  # a client can fetch it without a second round trip.
  ... on DisplacementsTransformation {
    store {
      ...ZarrStore
    }
  }
  # Like DISPLACEMENTS, but the field holds absolute output positions rather
  # than offsets. Also non-affine, also no closed-form inverse.
  ... on CoordinatesTransformation {
    store {
      ...ZarrStore
    }
  }
  # A declared NON-correspondence (a feature table vs. the image it was measured
  # from). No parameters, no matrix, and no placement search walks it — so the
  # only thing to show is why.
  ... on UnmappableTransformation {
    reason
  }
}

# One step of a server-resolved placement path: the edge to walk, and whether
# to walk it output→input (in which case the client inverts the composed
# matrix before applying it).
fragment PlacementStep on PlacementStep {
  transformation {
    ...Transformation
  }
  inverted
}

# GraphQL cannot express unbounded recursion, so composite transformations
# (Sequence / ByDimension / Bijection) are expanded to a fixed depth with
# leaves inside. Real edges are shallow: a pyramid level is
# Sequence[Scale, Translation]; a scene registration is
# ByDimension[Identity | Affine] or a bare Affine.
fragment Transformation on Transformation {
  ...LeafTransformation
  ... on SequenceTransformation {
    transformations {
      ...LeafTransformation
    }
  }
  ... on ByDimensionTransformation {
    transformations {
      ...LeafTransformation
      ... on SequenceTransformation {
        transformations {
          ...LeafTransformation
        }
      }
    }
  }
  ... on BijectionTransformation {
    transformations {
      ...LeafTransformation
    }
  }
}

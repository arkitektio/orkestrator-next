fragment Axis on Axis {
  id
  order
  name
  type
  unit
  longName
}

fragment ListCoordinateSystem on CoordinateSystem {
  id
  name
  kind
}

# What a system is a space OF — `kind` says what a system DENOTES, this says
# whose it is. Null for a hub, which nobody owns.
#
# Each member selects only what the breadcrumb renders. A Lens has no name of
# its own so it borrows its dataset's; a DataArray has neither a name nor a
# back-reference to its dataset, so a pyramid level can name only its level.
fragment CoordinateSystemOwner on CoordinateSystemOwner {
  __typename
  ... on ADataset {
    id
    name
  }
  ... on TableDataset {
    id
    name
  }
  ... on MeshCollection {
    id
    version
  }
  ... on Scene {
    id
    name
  }
  ... on Lens {
    id
    dataset {
      id
      name
    }
  }
  ... on DataArray {
    id
    level
  }
}

fragment CoordinateSystem on CoordinateSystem {
  id
  name
  kind
  # The wall-clock instant the time axis has its origin at
  # (`wall_clock = epoch + t * unit`). A property of the space itself, and only
  # meaningful for a calibrated system with a TIME axis — null means the clock
  # is unanchored, NOT that the time axis is unusable: it is still a perfectly
  # composable relative coordinate.
  epoch
  # A hub (ownerless, built to be registered into) vs. a scene's minted world.
  # Both are SHARED, so `kind` alone cannot tell them apart and the distinction
  # is not derivable client-side — a hub receives registrations and outlives
  # every scene over it; a scene's world cascades away with its scene.
  isHub
  # Whether createSceneFromCoordinateSystem will accept this system as a world.
  isAdoptableWorld
  owner {
    ...CoordinateSystemOwner
  }
  axes {
    ...Axis
  }
}

# The concrete per-kind payload of a transformation edge, WITHOUT recursing
# into composite children — the leaf selection shared by every nesting depth
# in the Transformation fragment below.
#
# `inputAxes`/`outputAxes` are the SELF-DESCRIBED axis order of the edge's
# parameters (scale/translation/affine columns follow inputAxes) — the reason
# the scene fragment no longer needs to ship every coordinate system's axes.
fragment LeafTransformation on Transformation {
  __typename
  id
  kind
  name
  inputAxes
  outputAxes
  # How much this map is actually known. The schema is emphatic that an assumed
  # placement must be visible — "This map was assumed, never measured -- badge
  # it" — and a layer's validity is the WEAKEST edge on its path to world, so
  # this is per-edge or it is nothing.
  validity
  input {
    id
    name
  }
  output {
    id
    name
  }
  ... on ScaleTransformation {
    scale
  }
  ... on TranslationTransformation {
    translation
  }
  ... on AffineTransformation {
    affine
  }
  ... on RotationTransformation {
    affine
  }
  # The displacement field itself now arrives as the store, not a bare id, so
  # a client can fetch it without a second round trip.
  ... on DisplacementsTransformation {
    store {
      ...ZarrStore
    }
  }
  # Like DISPLACEMENTS, but the field holds absolute output positions rather
  # than offsets. Also non-affine, also no closed-form inverse.
  ... on CoordinatesTransformation {
    store {
      ...ZarrStore
    }
  }
  # A declared NON-correspondence (a feature table vs. the image it was measured
  # from). No parameters, no matrix, and no placement search walks it — so the
  # only thing to show is why.
  ... on UnmappableTransformation {
    reason
  }
}

# One step of a server-resolved placement path: the edge to walk, and whether
# to walk it output→input (in which case the client inverts the composed
# matrix before applying it).
fragment PlacementStep on PlacementStep {
  transformation {
    ...Transformation
  }
  inverted
}

# GraphQL cannot express unbounded recursion, so composite transformations
# (Sequence / ByDimension / Bijection) are expanded to a fixed depth with
# leaves inside. Real edges are shallow: a pyramid level is
# Sequence[Scale, Translation]; a scene registration is
# ByDimension[Identity | Affine] or a bare Affine.
fragment Transformation on Transformation {
  ...LeafTransformation
  ... on SequenceTransformation {
    transformations {
      ...LeafTransformation
    }
  }
  ... on ByDimensionTransformation {
    transformations {
      ...LeafTransformation
      ... on SequenceTransformation {
        transformations {
          ...LeafTransformation
        }
      }
    }
  }
  ... on BijectionTransformation {
    transformations {
      ...LeafTransformation
    }
  }
}

fragment DataRoi on DataRoi {
  id
  name
  kind
  coordinateSystem {
    ...CoordinateSystem
  }
  vectors
  selectors {
    axis
    index
  }
  createdWithTransforms
  intrinsicBbox {
    min
    max
  }
}


fragment ListDataRoi on DataRoi {
  id
  name
  kind
  coordinateSystem {
    id
    name
  }
  vectors
}

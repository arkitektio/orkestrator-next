fragment File on File {
  origins {
    ...ListImage
  }
  id
  name
  store {
    ...BigFileStore
  }
  views(pagination: $viewPagination) {
    id
    seriesIdentifier
    image {
      ...ListImage
    }
  }
  provenanceEntries {
    ...ProvenanceEntry
  }
  organization {
    slug
  }
  size
  contentType
}

fragment ListFile on File {
  id
  name
  creator {
    sub
  }
  size
  contentType
}

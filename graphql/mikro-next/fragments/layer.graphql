fragment TransferFunction on TransferFunction {
  climMin
  climMax
  colormap
  color
  gamma
  opacity
  invert
  categorical
}

fragment ChannelSourceNode on ChannelSourceNode {
  intensityAxis
  intensityIndex
  visible
  transfer {
    ...TransferFunction
  }
}

# A region of phasor space and the color the pixels inside it are painted — a
# color rule on the image, not a plot widget.
fragment PhasorCursor on PhasorCursor {
  kind
  label
  visible
  color
  g
  s
  radius
  points
}

# Not a TransferFunction: it maps the reduction's output — a (g, s) pair plus a
# photon count — rather than a sampled scalar. `intensity` is the ordinary
# transfer applied to that photon count.
fragment PhasorTransfer on PhasorTransfer {
  colormap
  mode
  min
  max
  weightByIntensity
  intensity {
    ...TransferFunction
  }
  cursors {
    ...PhasorCursor
  }
}

fragment PhasorNode on PhasorNode {
  phasorAxis
  harmonic
  intensityAxis
  intensityIndex
  visible
  # Aliased: `transfer` on a ChannelSourceNode is a TransferFunction, here it is
  # a PhasorTransfer. Same response key, different types — GraphQL rejects the
  # merge, so the phasor one gets its own key.
  phasorTransfer: transfer {
    ...PhasorTransfer
  }
}

fragment RenderNodeCommon on LayerRenderNode {
  kind
  label
  ... on ChannelSourceNode {
    ...ChannelSourceNode
  }
  ... on PhasorNode {
    ...PhasorNode
  }
  ... on BlendNode {
    blending
  }
  ... on ProjectionNode {
    mode
  }
}

# GraphQL cannot express unbounded recursion, so the render-graph tree is
# expanded to a fixed depth (root BlendNode + 3 nested levels). Real graphs are
# shallow (Blend -> [Channel] or Blend -> Projection -> [Channel]).
fragment LayerRenderGraph on LayerRenderGraph {
  root {
    ...RenderNodeCommon
    children {
      ...RenderNodeCommon
      ... on BlendNode {
        children {
          ...RenderNodeCommon
          ... on BlendNode {
            children {
              ...RenderNodeCommon
            }
          }
          ... on ProjectionNode {
            children {
              ...RenderNodeCommon
            }
          }
        }
      }
      ... on ProjectionNode {
        children {
          ...RenderNodeCommon
          ... on BlendNode {
            children {
              ...RenderNodeCommon
            }
          }
          ... on ProjectionNode {
            children {
              ...RenderNodeCommon
            }
          }
        }
      }
    }
  }
}

fragment SceneLayer on Layer {
  __typename
  id
  kind
  blending
  opacity
  visible
  order
  # Server-resolved path from this layer's source CS to the scene's world
  # system (null = unregistered, [] = source IS world). The server orders the
  # edges; the client composes the matrices (transformGraph.ts).
  pathToWorld {
    ...PlacementStep
  }
  ... on ImageLayer {
    lens {
      ...SceneLens
    }
    # levelPaths is deliberately NOT selected: the octree renderer uses one
    # matrix per layer + relative level factors, so selecting it would pay a
    # server-side path resolution per pyramid level (duplicating the shared
    # registration tail) for zero client benefit. Reselect it when per-level
    # placement lands (COORDINATE_SYSTEMS.md §3.1).
    renderGraph {
      ...LayerRenderGraph
    }
  }
  # A whole collection, not one shape: the styling that used to sit on the
  # layer moved onto each Annotation, so the layer selects only the drawing
  # surface and the renderer queries the shapes inside it.
  ... on AnnotationLayer {
    annotationCollection {
      ...AnnotationCollection
    }
  }
  ... on PointLayer {
    tableDataset {
      ...TableDataset
    }
    xColumn
    yColumn
    zColumn
    tColumn
    sizeColumn
    colorColumn
    idColumn
    pointSize
    colormap
  }
  ... on TrackLayer {
    tableDataset {
      ...TableDataset
    }
    trackIdColumn
    xColumn
    yColumn
    zColumn
    tColumn
    colorByColumn
    lineWidth
    colormap
  }
  ... on MeshLayer {
    collection {
      ...MeshCollection
    }
    materialColor
    wireframe
  }
}

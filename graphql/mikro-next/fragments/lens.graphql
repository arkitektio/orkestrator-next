fragment DimSlice on Slice {
  dim
  start
  stop
  step
}

fragment SceneLens on Lens {
  id
  shape
  dims
  renderAxes {
    x
    y
    z
    t
    intensity
  }
  coordinateSystem {
    ...CoordinateSystem
  }
  toParent {
    ...Transformation
  }
  slices {
    ...DimSlice
  }
  dataset {
    id
    name
    dims
    shape
    multiscale
    coordinateSystem {
      ...CoordinateSystem
    }
    dataArrays {
      id
      level
      shape
      chunkShape
      coordinateSystem {
        id
        name
      }
      toParent {
        ...Transformation
      }
      store {
        ...ZarrStore
      }
    }
  }
  activeAnchors {
    id
    coordinates
    valueHistogram {
      bins
      histogram
      min
      max
      p1
      p99
    }
    channelLabel {
      label
    }
    lightGraph {
      graph {
        ...LightpathGraph
      }
    }
  }
}

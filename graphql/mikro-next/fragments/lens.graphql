fragment DimSlice on Slice {
  dim
  start
  stop
  step
}

fragment SceneLens on Lens {
  id
  shape
  dims
  renderAxes {
    x
    y
    z
    t
    intensity
  }
  # Id-only: the lens CS's axes are its dims by contract ("a selection never
  # drops or reorders an axis"), so selecting them would only duplicate dims.
  coordinateSystem {
    id
    name
  }
  toParent {
    ...Transformation
  }
  slices {
    ...DimSlice
  }
  dataset {
    id
    name
    dims
    shape
    multiscale
    # Id-only: consumed for CS-id matching (mesh anchoring, path prefixes);
    # its axis order is the dataset's dims by definition.
    intrinsicSystem {
      id
      name
    }
    dataArrays {
      id
      level
      shape
      chunkShape
      coordinateSystem {
        id
        name
      }
      toParent {
        ...Transformation
      }
      store {
        ...ZarrStore
      }
    }
  }
  activeAnchors {
    id
    coordinates
    valueHistogram {
      bins
      histogram
      min
      max
      p1
      p99
    }
    channelLabel {
      label
    }
    lightGraph {
      graph {
        ...LightpathGraph
      }
    }
  }
}

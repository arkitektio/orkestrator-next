fragment Scene on Scene {
  id
  name
  # How the scene asks to be opened: flat, volumetric, or AUTO (no preference
  # stated — the viewer decides from the data). A preference, not a constraint:
  # nothing server-side reads it, and the viewer stays free to overrule it.
  preferredView
  # The viewer background as RGBA; null lets the viewer keep its own.
  backgroundColor
  # The named camera tours through this composition.
  animations {
    ...Animation
  }
  # The most recent picture of this composition — the tile to put on the scene.
  # Null until something snapshots it.
  latestSnapshot {
    ...SceneSnapshot
  }
  worldCoordinateSystem {
    ...CoordinateSystem
  }
  # scene.coordinateSystems is deliberately NOT selected: every edge now
  # self-describes its parameter order (Transformation.inputAxes/outputAxes),
  # which was the global list's only client-side job — everything else was
  # duplication of systems already delivered inline where they're used.
  registrations {
    ...Transformation
  }
  layers {
    ...SceneLayer
  }
}

fragment ListScene on Scene {
  id
  name
}

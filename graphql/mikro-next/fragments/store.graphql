fragment ZarrStore on ZarrStore {
  id
  key
  bucket
  path
  shape
  dtype
  chunks
  version
}

fragment ParquetStore on ParquetStore {
  id
  key
  bucket
  path
}

fragment BigFileStore on BigFileStore {
  id
  key
  bucket
  path
  accessGrant {
   ...BigFileAccessGrant
  }
}

fragment MediaStore on MediaStore {
  id
  key
  bucket
}


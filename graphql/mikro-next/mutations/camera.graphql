mutation CreateCamera(
  $serialNumber: String!
  $name: String
  $pixelSizeX: Length
  $pixelSizeY: Length
  $sensorSizeX: Int
  $sensorSizeY: Int
) {
  createCamera(
    input: {
      name: $name
      pixelSizeX: $pixelSizeX
      serialNumber: $serialNumber
      pixelSizeY: $pixelSizeY
      sensorSizeX: $sensorSizeX
      sensorSizeY: $sensorSizeY
    }
  ) {
    id
    name
  }
}

mutation EnsureCamera(
  $serialNumber: String!
  $name: String
  $pixelSizeX: Length
  $pixelSizeY: Length
  $sensorSizeX: Int
  $sensorSizeY: Int
) {
  ensureCamera(
    input: {
      name: $name
      pixelSizeX: $pixelSizeX
      serialNumber: $serialNumber
      pixelSizeY: $pixelSizeY
      sensorSizeX: $sensorSizeX
      sensorSizeY: $sensorSizeY
    }
  ) {
    id
    name
  }
}

mutation DeleteScene($id: ID!) {
  deleteScene(input: { id: $id })
}

# Adopt an already-uploaded media file as a picture of the scene — the tile that
# represents the composition without loading its layers. `file` is an
# `ImageFileLike`: the media store's id, as returned by the upload flow in
# `components/scene/data/mediaUpload.ts`.
mutation CreateSceneSnapshot($scene: ID!, $file: ImageFileLike!, $name: String) {
  createSceneSnapshot(input: { scene: $scene, file: $file, name: $name }) {
    ...SceneSnapshot
  }
}

# The scene's viewer preferences: how a client should open it. Both fields are
# nullable-and-optional server-side, so omitting one leaves it untouched —
# which is why the client sends only what it means to change.
#
# Returns the full Scene so Apollo writes the new preferences straight into the
# normalized cache; the viewer hydrates its stores at mount, so the refetched
# fields matter for the NEXT open, not for the live canvas.
mutation UpdateScene(
  $id: ID!
  $preferredView: PreferredView
  $backgroundColor: [Float!]
) {
  updateScene(
    input: {
      id: $id
      preferredView: $preferredView
      backgroundColor: $backgroundColor
    }
  ) {
    ...Scene
  }
}

# Bootstraps a whole renderable scene for an array dataset in one call: a world
# mirroring the dataset's calibration, a full lens, and one default image layer.
# `kind` is optional — the server infers the layer recipe from the dataset's
# axes (RGB for a 3-channel 2D image, VOLUME when there is a z axis, …), and
# only LABEL has to be asked for, since nothing structural marks a label map.
mutation CreateSceneFromDataset(
  $dataset: ID!
  $name: String
  $kind: BootstrapLayerKind
) {
  createSceneFromDataset(input: { dataset: $dataset, name: $name, kind: $kind }) {
    ...ListScene
  }
}

# Mirrors a coordinate system (usually a SHARED hub) into a new scene and
# materializes the sources already registered into it as layers, filtered by the
# policy (nchildren cap, meshes, table transforms — server defaults apply).
mutation CreateSceneFromCoordinateSystem(
  $input: CreateSceneFromCoordinateSystemInput!
) {
  createSceneFromCoordinateSystem(input: $input) {
    ...ListScene
  }
}

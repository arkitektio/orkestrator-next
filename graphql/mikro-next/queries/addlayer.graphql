# Candidate sources for the Add Layer dialog. Placeability into the scene is now
# decided server-side by the `placeableIn` filter (a lens/table whose space has a
# traversable path to the scene's world), so the dialog no longer walks the
# coordinate graph client-side.

# Image layers are created from a lens, so the image section lists placeable
# lenses directly — the selected lens is the layer's source.
query AddLayerLensCandidates(
  $filters: LensFilter
  $pagination: OffsetPaginationInput
) {
  lenses(filters: $filters, pagination: $pagination) {
    id
    shape
    axisNames
    slices {
      ...DimSlice
    }
    dataset {
      id
      name
      description
    }
  }
}

query AddLayerTableDatasetCandidates(
  $filters: TableDatasetFilter
  $pagination: OffsetPaginationInput
) {
  tableDatasets(filters: $filters, pagination: $pagination) {
    ...ListTableDataset
    coordinateSystem {
      id
      name
    }
    columns {
      ...TableDatasetColumn
    }
  }
}

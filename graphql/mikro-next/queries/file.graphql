query GetFile($id: ID!, $viewPagination: OffsetPaginationInput = { limit: 5, offset: 0 }) {
  file(id: $id) {
    ...File
  }
}

query GetFiles(
  $filters: FileFilter
  $pagination: OffsetPaginationInput
  $order: FileOrder
) {
  files(filters: $filters, pagination: $pagination, order: $order) {
    ...ListFile
  }
}

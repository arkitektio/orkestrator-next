query GetFile($id: ID!, $viewPagination: OffsetPaginationInput = { limit: 5, offset: 0 }) {
  file(id: $id) {
    ...File
  }
}

query GetFiles(
  $filters: FileFilter
  $pagination: OffsetPaginationInput
  $ordering: [FileOrder!]
) {
  files(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...ListFile
  }
}

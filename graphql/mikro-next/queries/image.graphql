query GetImage($id: ID!) {
  image(id: $id) {
    ...Image
  }
}

query GetImages(
  $filters: ImageFilter
  $pagination: OffsetPaginationInput
  $ordering: [ImageOrder!]
) {
  images(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...ListImage
  }
}

query ListImages(
  $filters: ImageFilter
  $pagination: OffsetPaginationInput
  $ordering: [ImageOrder!]
) {
  images(filters: $filters, pagination: $pagination, ordering: $ordering) {
    ...ListImage
  }
}



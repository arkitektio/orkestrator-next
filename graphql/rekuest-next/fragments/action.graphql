fragment ListAction on Action {
  id
  name
  description
  hash
  kind
  scope
  stateful
  implementations {
    id
    agent {
      id
    }
  }
  logo
  key
  version
  app {
    identifier
  }
  latestTask {
    id
    args
  }
}

fragment SearchAction on Action {
  id
  name
  description
  hash
  logo
  kind
  scope
}

fragment GraphNodeAction on Action {
  name
  description
  kind
  hash
  id
  logo
  stateful
  collections {
    id
    name
  }
  ...Ports
  protocols {
    name
  }
  app {
    identifier
  }
}

fragment DetailAction on Action {
  ...GraphNodeAction
  implementations {
    ...MinimalImplementation
  }
  testCases {
    ...ListTestCase
  }
  tests {
    id
    name
    description
    runs {
      implementation_id: arg(key: "implementation")
      latestEventKind
    }
  }
  tasks(pagination: { limit: 10, offset: 0 }) {
    ...MinimalTask
  }
  key
  version
  app {
    identifier
  }
  hash
}

fragment PrimaryAction on Action {
  id
  stateful
  name
  hash
  logo
  implementations {
    id
    interface
  }
  args {
    key
    identifier
    kind
    nullable
    default
  }
  description
}

fragment HoverAction on Action {
  id
  name
  description
  kind
  stateful
  logo
  app {
    identifier
  }
  implementations(pagination: { limit: 6 }) {
    id
    interface
    agent {
      id
      name
      active
    }
  }
  tasks(pagination: { limit: 5 }, ordering: { createdAt: DESC }) {
    id
    latestEventKind
    isDone
    createdAt
  }
}

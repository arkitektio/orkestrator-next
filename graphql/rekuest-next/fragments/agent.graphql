fragment Agent on Agent {
  id
  instanceId
  implementations {
    ...ListImplementation
  }
  memoryShelve {
    id
  }
  states {
    ...State
  }
  registry {
    client {
      clientId
      release {
        version
        app {
          identifier
        }
      }
      device {
        deviceId
      }

    }
    user {
      sub
    }
  }
  blocked
  pinned
  extensions
  name
  active
  connected
  lastSeen
  assignations(pagination: { limit: 5 }) {
    ...ListAsssignation
  }
  placements(pagination: { limit: 1 }, ordering: { createdAt: DESC }) {
    ...AgentPlacement
  }
}

fragment ListAgent on Agent {
  id
  instanceId
  active
  connected
  name
  lastSeen
  pinned
  blocked
  registry {
    client {
      clientId
    }
    user {
      sub
    }
  }
  app {
    identifier
  }
  release {
    version
  }
  device {
    id
  }
  user {
    sub
  }
}



fragment AgentChangeEvent on AgentChangeEvent {
  create {
    ...ListAgent
  }
  update {
    ...ListAgent
  }
  delete
}

fragment ProtocolAgent on Agent {
  id
  app {
    identifier
  }
  name
  states {
    ...State
  }
  implementations {
    interface
    action {
      key
      name
      description
      args {
        ...ArgPort
      }
      returns {
        ...ReturnPort
      }
    }
  }
}
fragment Agent on Agent {
  id
  implementations {
    ...ListImplementation
  }
  memoryShelve {
    id
  }
  states {
    ...State
  }
  client {
    clientId
    release {
      version
      app {
        identifier
      }
    }
    device {
      deviceId
    }
  }
  user {
    sub
  }
  blocked
  pinned
  name
  active
  connected
  lastSeen
  tasks(pagination: { limit: 5 }) {
    ...ListTask
  }
  placements(pagination: { limit: 1 }, ordering: { createdAt: DESC }) {
    ...AgentPlacement
  }
}


fragment ListAgent on Agent {
  id
  active
  connected
  name
  lastSeen
  pinned
  blocked
  client {
    clientId
  }
  user {
    sub
  }


  app {
    identifier
  }
  release {
    version
  }
  device {
    id
    deviceId
  }
  user {
    sub
  }
}

fragment SearchAgent on Agent {
  id
  name
  connected
  blocked
  app {
    identifier
  }
  release {
    version
  }
}



# Non-traversable agent subscription delta. Relations are scalar IDs; the client
# hydrates the full agent once via query on `create` and merges hot scalars into
# the normalized cache on `update`. See AgentUpdater.tsx.
fragment AgentChange on AgentChange {
  id
  name
  kind
  latestEvent
  connected
  blocked
  lastSeen
  client
  user
  organization
  app
  release
}

fragment AgentChangeEvent on AgentChangeEvent {
  create {
    ...AgentChange
  }
  update {
    ...AgentChange
  }
  delete
}

fragment HoverAgent on Agent {
  id
  name
  active
  connected
  blocked
  pinned
  lastSeen
  app {
    identifier
  }
  release {
    version
  }
  user {
    sub
  }
  latestHardwareRecord {
    cpuCount
    cpuVendorName
  }
  implementations(pagination: { limit: 6 }) {
    id
    interface
    action {
      id
      name
    }
  }
}

fragment PostmanAssignation on Assignation {
  id
  latestEventKind
  args
  reference
  isDone
  events(ordering: {createdAt: DESC}) {
    ...AssignationEvent
  }
  ephemeral
  action {
    hash
    id
    name
    ...Ports
  }
  reservation {
    id
    title
    action {
      name
    }
  }
  dependencyMethod
  dependency
  dependencies
  implementation {
    id
    interface
    higherOrderFor {
      id
      action {
        id
        key
        interfaces
      }
    }
  }
  createdAt
  finishedAt
}

fragment MinimalAssignation on Assignation {
  id
  reference
  latestEventKind
  isDone
  createdAt
  implementation {
    id
    interface
    agent {
      name
    }
  }
}

fragment NoChildrenDetailAssignation on Assignation {
  ...PostmanAssignation
  parent {
    id
  }
  finishedAt
  implementation {
    agent {
      client {
        clientId
        device {
          deviceId
        }
      }

    name
    }
  }
}

fragment DetailAssignation on Assignation {
  ...PostmanAssignation
  children {
    ...PostmanAssignation
  }
  parent {
    id
  }
  finishedAt
  implementation {
    agent {
      id
      client {
        clientId
        device {
          deviceId
        }
      }

    name
    placements(pagination: { limit: 1 }, ordering: { createdAt: DESC }) {
        ...AgentPlacement
    }
    }
    dependencies {
      id
      key
      appFilter
      versionFilter
      autoResolvable
      actionDemands {
        key
      }
    }
  }
  resolvedDependencies {

    key
    values
    mappedAgents {
      agent {
        id
        name
        placements(pagination: { limit: 1 }, ordering: { createdAt: DESC }) {
            ...AgentPlacement
        }

      }

      mappedImplementations {
        key
        implementation {
          id
        }
      }
    }
  }
}

fragment AssignationEvent on AssignationEvent {
  id
  kind
  level
  returns
  assignation {
    id
    reference
  }
  progress
  reference
  createdAt
  message
  delegatedTo {
    id
    implementation {
      id
      interface
      action {
        name
      }
    }
  }
}
fragment AssignationChangeEvent on AssignationChangeEvent {
  create {
    ...PostmanAssignation
  }
  event {
    ...AssignationEvent
  }
}
fragment ChildAssignationEvent on ChildAssignationEvent {
  create {
    ...PostmanAssignation
  }
  update {
    ...PostmanAssignation
  }
}

fragment ListAsssignation on Assignation {
  id
  reference
  latestEventKind
  isDone
  finishedAt
  createdAt
  action {
    id
    name
  }
  implementation {
    id
    interface
  }
  createdAt
}

fragment HoverAssignation on Assignation {
  id
  reference
  latestEventKind
  isDone
  statusMessage
  createdAt
  finishedAt
  action {
    id
    name
  }
  implementation {
    id
    interface
    agent {
      id
      name
    }
  }
  events(pagination: { limit: 5 }) {
    id
    kind
    progress
    message
    createdAt
  }
}

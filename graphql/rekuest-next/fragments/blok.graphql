

fragment Blok on Blok {
  id
  name
  materializedBloks {
    ...ListMaterializedBlok
  }
  dependencies {
    id
    key
  }
  catalog {
    id
    name
  }
  components {
    id
    component
    props
    children
  }
  uiComponents
  demoState
}

fragment MaterializedBlok on MaterializedBlok {
  id
  blok {
    ...Blok
  }
  dashboard {
    id
  }
  agentMappings {
    key
    agent {
      id
    }
  }
}

fragment ListBlok on Blok {
  id
  name

}


fragment ListMaterializedBlok on MaterializedBlok {
  id
  blok {
    id
    name

  }
  dashboard {
    id
  }
}

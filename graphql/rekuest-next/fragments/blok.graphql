

fragment Blok on Blok {
  id
  name
  materializedBloks {
    ...ListMaterializedBlok
  }
  dependencies {
    id
    key
  }
  catalog {
    id
    name
  }
  components {
    id
    component
    props {
      staticValue
      dynamicValue {
        path
        literal
      }
      agentCall {
         operation
         dependency
         arguments {
          key
          valueLiteral
          valuePath
          valueDict {
            key
            valueLiteral
            valuePath
          }
         }
      }
      utilCall {
          operation
        arguments {
          key
          valueLiteral
          valuePath
          valueDict {
            key
            valueLiteral
            valuePath
          }
         }
      }
    }
    children {
      id
      component
    }
  }
  uiComponents
  demoState
}

fragment MaterializedBlok on MaterializedBlok {
  id
  blok {
    ...Blok
  }
  agentMappings {
    key
    agent {
      id
    }
  }
}

fragment ListBlok on Blok {
  id
  name

}


fragment ListMaterializedBlok on MaterializedBlok {
  id
  blok {
    id
    name

  }
}

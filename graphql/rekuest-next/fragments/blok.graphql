

fragment Blok on Blok {
  id
  name
  materializedBloks {
    ...MaterializedBlok
  }
  dependencies {
    id
    key
  }
}

fragment MaterializedBlok on MaterializedBlok {
  id
  blok {
    id
    name
    url
  }
  dashboard {
    id
  }
  mappedAgents {
    key
    agent {
      id
    }
  }
}

fragment ListBlok on Blok {
  id
  name

}

fragment DetailImplementation on Implementation {
  id
  interface
  action {
    ...DetailAction
  }
  extension
  params
  agent {
    id
    name
    active
  }

  dependencies {
    ...ListDependency
  }
  tracks {
    dependencyKey
    stateKey
    valueKey
    description
  }
  manipulates {
    id
    interface
  }



  myLatestAssignation {
    ...PostmanAssignation
  }
}

fragment ListImplementation on Implementation {
  id
  interface
  action {
    description
    name
    stateful
  }
  agent {
    name
    active
  }
}

fragment MinimalImplementation on Implementation {
  id
  interface
  extension
  agent {
    name
  }
}

query ImplementationStats($id: ID!) {
  assignationStats(filters: { implementation: $id }) {
    count
  }
}

fragment DetailImplementation on Implementation {
  id
  name
  interface
  pinned
  needsToken
  provenanceAudience
  params
  higherOrderConfig
  action {
    ...DetailAction
  }
  agent {
    id
    name
    active
    connected
    blocked
    kind
    lastSeen
    hash
    app {
      identifier
    }
    client {
      id
    }
  }

  dependencies {
    ...ListDependency
  }
  tracks {
    dependencyKey
    stateKey
    valueKey
    label
    description
  }
  manipulates {
    id
    interface
    definition {
      name
    }
  }

  resolutions {
    id
    name
    resolvedAt
  }

  higherOrderFor {
    id
    interface
    name
  }

  lowerOrderImplementations {
    id
    interface
    name
  }

  tests {
    id
    interface
    name
  }

  myLatestAssignation {
    ...PostmanAssignation
  }
}

fragment ListImplementation on Implementation {
  id
  interface
  action {
    id
    description
    name
    stateful
  }
  agent {
    name
    active
  }
}

fragment MinimalImplementation on Implementation {
  id
  interface
  agent {
    name
  }
}

query ImplementationStats($id: ID!) {
  assignationStats(filters: { implementation: $id }) {
    count
  }
}

fragment HoverImplementation on Implementation {
  id
  interface
  pinned
  action {
    id
    name
    description
    kind
    stateful
    logo
    app {
      identifier
    }
    args {
      key
      label
      kind
      nullable
      default
    }
  }
  agent {
    id
    name
    active
    connected
  }
}

fragment MemoryShelve on MemoryShelve {
  agent {
    name
  }
  id
  name
  drawers {
    id
    label
    description
    resourceId
  }
}

fragment ListMemoryShelve on MemoryShelve {
  agent {
    name
  }
  id
  name

}

fragment AgentChangeEvent on AgentChangeEvent {
  create {
    ...ListAgent
  }
  update {
    ...ListAgent
  }
  delete
}

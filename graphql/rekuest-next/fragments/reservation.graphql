fragment PostmanReservation on Reservation {
  title
  id
  reference
  action {
    ...Ports
    name
    description
    hash
  }
  viable
  happy
}

fragment ListReservation on Reservation {
  id
  title
  reference
  action {
    name
    description
    hash
  }
}

fragment DetailReservation on Reservation {
  ...PostmanReservation
  action {
    name
    description
    ...Ports
  }
}

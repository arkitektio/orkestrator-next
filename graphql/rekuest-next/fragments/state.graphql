fragment State on State {
  id
  value
  stateSchema {
    hash
    name
    ports {
      ...ReturnPort
    }
  }
  updatedAt
}

fragment StateEvent on State {
  id
  value
  updatedAt
}



fragment StatePatchEvent on StatePatchEvent {
  stateId
  agentId
  op
  path
  value
  globalRevision
  sessionId
  timestamp
}

fragment StateSnapshotEvent on StateSnapshotEvent {
  stateId
  agentId
  interface
  value
  globalRevision
  sessionId
  timestamp
}

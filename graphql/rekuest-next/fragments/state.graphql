fragment State on State {
  id
  definition {
    hash
    name
    ports {
      ...ReturnPort
    }
  }
  interface
  updatedAt
}

fragment StateEvent on State {
  id
  updatedAt
}

fragment Patch on Patch {
  id
  op
  path
  value
}

fragment StatePatchEvent on StatePatchEvent {
  stateId
  agentId
  op
  path
  value
  globalRevision
  sessionId
  timestamp
  interface
}

fragment StateSnapshotEvent on StateSnapshotEvent {
  stateId
  agentId
  interface
  value
  globalRevision
  sessionId
  timestamp
}
fragment AgentSnapshotEvent on AgentSnapshotEvent {
  agentId
  values
  globalRevision
  sessionId
  timestamp
}

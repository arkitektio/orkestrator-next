fragment ListPortUsage on PortUsage {
  portKey
  index
  keyPath
  modifiers
  action {
    id
    name
    description
  }
}

fragment ListOutputStructureUsage on PortUsage {
  ...ListPortUsage
}

fragment ListInputStructureUsage on PortUsage {
  ...ListPortUsage
}

fragment ListInputInterfaceUsage on PortUsage {
  ...ListPortUsage
}

fragment ListOutputInterfaceUsage on PortUsage {
  ...ListPortUsage
}

fragment Structure on Structure {
  id
  key
  description
  implements {
    ...Interface
  }
  outputUsages {
    ...ListOutputStructureUsage
  }
  inputUsages {
    ...ListInputStructureUsage
  }
}

fragment ListStructure on Structure {
  id
  key
  description
  implements {
    ...Interface
  }
}

fragment ListInterface on Interface {
  id
  key
  description
}

fragment Interface on Interface {
  id
  key
  description
  outputUsages {
    ...ListOutputInterfaceUsage
  }
  inputUsages {
    ...ListInputInterfaceUsage
  }
}

fragment StructurePackage on StructurePackage {
  id
  key
  structures {
    ...ListStructure
  }
  interfaces {
    ...ListInterface
  }
}

fragment ListStructurePackage on StructurePackage {
  id
  key
  description
}

mutation Reserve(
  $instanceId: InstanceId!
  $action: ID
  $hash: ActionHash
  $implementation: ID
  $title: String
) {
  reserve(
    input: {
      instanceId: $instanceId
      action: $action
      implementation: $implementation
      hash: $hash
      title: $title
    }
  ) {
    ...PostmanReservation
  }
}

query Agents(
  $pagination: OffsetPaginationInput
  $filters: AgentFilter
  $ordering: [AgentOrder!]
) {
  agents(ordering: $ordering, pagination: $pagination, filters: $filters) {
    ...ListAgent
  }
}

query Agent($id: ID!) {
  agent(id: $id) {
    ...Agent
  }
}

query AgentForProtocol($id: ID!) {
  agent(id: $id) {
    ...ProtocolAgent
  }
}


query AgentOptions($search: String, $values: [ID!], $dependency: ID) {
  options: agents(
    filters: { search: $search, ids: $values, dependency: $dependency }
    pagination: { limit: 10 }
  ) {
    value: id
    label: name
  }
}


query AgentForDependency($search: String, $values: [ID!], $dependency: ID) {
  agents: agents(
    filters: { search: $search, ids: $values, dependency: $dependency }
    pagination: { limit: 10 }
  ) {
   ...ListAgent
  }
}

query HoverAgent($id: ID!) {
  agent(id: $id) {
    ...HoverAgent
  }
}

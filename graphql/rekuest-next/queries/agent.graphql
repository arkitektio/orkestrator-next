query Agents(
  $pagination: OffsetPaginationInput
  $filters: AgentFilter
  $order: AgentOrder
) {
  agents(order: $order, pagination: $pagination, filters: $filters) {
    ...ListAgent
  }
}

query Agent($id: ID!) {
  agent(id: $id) {
    ...Agent
  }
}


query AgentOptions($search: String, $values: [ID!]) {
  options: agents(
    filters: { search: $search, ids: $values }
    pagination: { limit: 10 }
  ) {
    value: id
    label: name
  }
}

query Assignations {
  assignations {
    ...PostmanAssignation
  }
}

query DetailAssignation($id: ID!) {
  assignation(id: $id) {
    ...DetailAssignation
  }
}

query ListAssignations(
  $filter: AssignationFilter
  $ordering: [AssignationOrder!]
  $pagination: OffsetPaginationInput
) {
  tasks(filters: $filter, pagination: $pagination, ordering: $ordering) {
    ...ListAsssignation
  }
}

query ListAssignationsDetails(
  $filter: AssignationFilter
  $ordering: [AssignationOrder!]
  $pagination: OffsetPaginationInput
) {
  tasks(filters: $filter, pagination: $pagination, ordering: $ordering) {
    ...PostmanAssignation
  }
}


query NoChildrenDetailAssignation($id: ID!) {
  assignation(id: $id) {
    ...NoChildrenDetailAssignation
  }
}

query HoverAssignation($id: ID!) {
  assignation(id: $id) {
    ...HoverAssignation
  }
}

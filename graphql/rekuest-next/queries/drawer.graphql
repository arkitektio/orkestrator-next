query SearchMemoryDrawer(
  $search: String,
  $implementation: ID,
  $values: [ID!],
  $identifier: String,
  $pagination: OffsetPaginationInput,
) {
  options: memoryDrawers(
    filters: {
      search: $search,
      implementation: $implementation,
      ids: $values,
      identifier: $identifier,
    },
    pagination: $pagination
  ) {
    label: label
    value: id
  }
}
query GetMemoryDrawer($id: ID!) {
  memoryDrawer(id: $id) {
    id
    label
    identifier
  }
}

query GlobalSearch(
  $search: String
  $noActions: Boolean!
  $noAgents: Boolean!
  $pagination: OffsetPaginationInput
) {
  actions: actions(filters: { search: $search }, pagination: $pagination)
    @skip(if: $noActions) {
    ...ListAction
  }
  agents: agents(filters: { search: $search }, pagination: $pagination)
    @skip(if: $noAgents) {
    ...SearchAgent
  }
}

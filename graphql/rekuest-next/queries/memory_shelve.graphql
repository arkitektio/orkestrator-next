query MemoryShelves(
  $pagination: OffsetPaginationInput
  $filters: MemoryShelveFilter
  $ordering: [MemoryShelveOrder!]
) {
  memoryShelves(ordering: $ordering, pagination: $pagination, filters: $filters) {
    ...ListMemoryShelve
  }
}

query MemoryShelve($id: ID!) {
  memoryShelve(id: $id) {
    ...MemoryShelve
  }
}

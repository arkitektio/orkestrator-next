query Placements(
  $pagination: OffsetPaginationInput
  $filters: PlacementFilter
  $order: PlacementOrder
) {
  placements(order: $order, pagination: $pagination, filters: $filters) {
    ...ListPlacement
  }
}

query Placement($id: ID!) {
  placement(id: $id) {
    ...Placement
  }
}


query PlacementOptions($search: String, $values: [ID!]) {
  options: placements(
    filters: { search: $search, ids: $values }
    pagination: { limit: 10 }
  ) {
    value: id
    label: name
  }
}

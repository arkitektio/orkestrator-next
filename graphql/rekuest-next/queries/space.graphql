query Spaces(
  $pagination: OffsetPaginationInput
  $filters: SpaceFilter
  $ordering: [SpaceOrder!]
) {
  spaces(ordering: $ordering, pagination: $pagination, filters: $filters) {
    ...ListSpace
  }
}

query Space($id: ID!) {
  space(id: $id) {
    ...Space
  }
}


query SpaceOptions($search: String, $values: [ID!]) {
  options: spaces(
    filters: { search: $search, ids: $values}
    pagination: { limit: 10 }
  ) {
    value: id
    label: name
  }
}

query GetState($id: ID!) {
  state(id: $id) {
    ...State
  }
}

query GetStateFor($agent: ID!, $stateHash: String, $demand: SchemaDemandInput) {
  stateFor(agent: $agent, stateHash: $stateHash, demand: $demand) {
    ...State
  }
}



query Checkout($state: ID!, $globalRevision: Int, $timestamp: DateTime, $sessionId: ID) {
  checkout(state: $state, globalRevision: $globalRevision, timestamp: $timestamp, sessionId: $sessionId) {
    stateId
    value
    globalRevision
    localRevision
  }
}


query CheckoutAgent($agent: ID!, $globalRevision: Int , $timestamp: DateTime, $sessionId: ID) {
  checkoutAgent(agent: $agent, globalRevision: $globalRevision, timestamp: $timestamp, sessionId: $sessionId) {
    stateId
    value
    globalRevision
    localRevision
  }
}

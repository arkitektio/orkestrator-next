query GetState($id: ID!) {
  state(id: $id) {
    ...State
  }
}

query GetStateFor($agent: ID!, $stateHash: String, $demand: SchemaDemandInput) {
  stateFor(agent: $agent, stateHash: $stateHash, demand: $demand) {
    ...State
  }
}



query Checkout($state: ID!, $globalRevision: Int) {
  checkout(state: $state, globalRevision: $globalRevision) {
    value
    globalRevision
    localRevision
  }
}

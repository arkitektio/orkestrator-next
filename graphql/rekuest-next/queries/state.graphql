query GetState($id: ID!) {
  state(id: $id) {
    ...State
  }
}

query GetStateFor($agent: ID!, $stateHash: String, $demand: SchemaDemandInput) {
  stateFor(agent: $agent, stateHash: $stateHash, demand: $demand) {
    ...State
  }
}




query Checkout($state: ID!, $globalRevision: Int, $timestamp: DateTime, $sessionId: ID, $forwardPatchCount: Int) {
  checkout(state: $state, globalRevision: $globalRevision, timestamp: $timestamp, sessionId: $sessionId, forwardPatchCount: $forwardPatchCount) {
    stateId
    value
    globalRevision
    forwardPatches {
     ...Patch
    }

  }
}


query CheckoutAgent($agent: ID!, $globalRevision: Int , $timestamp: DateTime, $sessionId: ID, $forwardPatchCount: Int) {
  checkoutAgent(agent: $agent, globalRevision: $globalRevision, timestamp: $timestamp, sessionId: $sessionId, forwardPatchCount: $forwardPatchCount,) {
    agentId
    values
    globalRevision
    forwardPatches {
     ...Patch
    }
  }
}

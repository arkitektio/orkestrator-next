# Global, always-running stream: root tasks created by THIS client (caller scoped,
# no child tasks). Consumed by the global TaskUpdater.
subscription WatchMyTasks {
  mytasks {
    ...TaskChangeEvent
  }
}

# Org-wide root task changes. Only for the dedicated org-wide tasks page.
subscription WatchOrgTasks {
  tasks {
    ...TaskChangeEvent
  }
}

# All descendant task changes of a task. Only on the task-detail page.
subscription WatchChildTasks($parentId: ID!) {
  childTasks(id: $parentId) {
    ...ChildTaskEvent
  }
}

# Live create/update of tasks for ONE agent. Used by the agent detail page to keep
# its "latest tasks" section current.
subscription WatchAgentTasks($agent: ID!) {
  agentTasks(agent: $agent) {
    create {
      ...ListTask
    }
    update {
      ...ListTask
    }
  }
}

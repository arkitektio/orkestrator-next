"Port\n\n    A Port is a single input or output of a action. It is composed of a key and a kind\n    which are used to uniquely identify the port.\n\n    If the Port is a structure, we need to define a identifier and scope,\n    Identifiers uniquely identify a specific type of model for the scopes (e.g\n    all the ports that have the identifier \"@mikro/image\" are of the same type, and\n    are hence compatible with each other). Scopes are used to define in which context\n    the identifier is valid (e.g. a port with the identifier \"@mikro/image\" and the\n    scope \"local\", can only be wired to other ports that have the same identifier and\n    are running in the same app). Global ports are ports that have the scope \"global\",\n    and can be wired to any other port that has the same identifier, as there exists a\n    mechanism to resolve and retrieve the object for each app. Please check the rekuest\n    documentation for more information on how this works.\n\n\n    "
input ReturnPortInput {
  """The child ports (used for list, dict, union and model ports)."""
  children: [ReturnPortInput!] = null

  """The options for the port. This is used for dropdowns and text inputs"""
  choices: [ChoiceInput!] = null

  """The default value for the port."""
  default: AnyDefault = null

  """
  The description of the port. This is the text that is displayed in the UI when the user hovers over the port
  """
  description: String = null

  """The effects of the port"""
  effects: [EffectInput!] = null

  """
  The identifier of a structure port. This is used to uniquely identify a specific type of structure.
  """
  identifier: String = null

  """The key of the port"""
  key: String!

  """
  The kind of the port. This is the type of the port. Can be either int, string, structure, list, bool, dict, float, date, union or model
  """
  kind: PortKind!

  """The label of the port. This is the text that is displayed in the UI"""
  label: String = null

  """
  Whether the port is nullable or not. If the port is nullable, it can be set to null. If the port is not nullable, it cannot be set to null
  """
  nullable: Boolean! = false

  """
  The provisions for the port. Provisions are key-value pairs that can be used to add additional metadata to a port. When using rekuest's action search, you can filter actions based on their port provisions
  """
  provides: [ProvidesInput!] = null

  """The validators for the port"""
  validators: [ValidatorInput!] = null

  """The return widget to use for this port."""
  widget: ReturnWidgetInput = null
}

interface ReturnWidget {
  kind: ReturnWidgetKind!
}

"A Return Widget is a UI element that is used to display the value of a port.\n\n    Return Widgets get displayed both if we show the return values of an assignment,\n    but also when we inspect the given arguments of a previous run task. Their primary\n    usecase is to adequately display the value of a port, in a user readable way.\n\n    Return Widgets are often overwriten by the underlying UI framework (e.g. Orkestrator)\n    to provide a better user experience. For example, a return widget that displays a\n    date could be overwriten to display a calendar widget.\n\n    Return Widgets provide more a way to customize this overwriten behavior.\n\n    "
input ReturnWidgetInput {
  """
  The choices to display in the dropdown. This is used for dropdowns and text inputs
  """
  choices: [ChoiceInput!] = null

  """The hook to run (if it is a custom return widget)."""
  hook: String = null

  """
  The kind of the return widget. Can be either dropdown, text, slider, checkbox, radio or custom
  """
  kind: ReturnWidgetKind!

  """The maximum value to display (if a slider)."""
  max: Int = null

  """The minimum value to display (if a slider)."""
  min: Int = null

  """The placeholder text of the return widget."""
  placeholder: String = null

  """
  The query to run when searching for choices. This is used for dropdowns and text inputs
  """
  query: SearchQuery = null

  """The step value to display (if a slider)."""
  step: Int = null

  """The ward responsible for handling the return widget."""
  ward: String = null
}

"""The kind of return widget."""
enum ReturnWidgetKind {
  CHOICE
  CUSTOM
  PROXY
}


  TRACK_ID
}

"""
A parquet-backed table whose rows are scientific records (segmented objects, localizations, cells). It owns a coordinate system whose axes are its coordinate columns, which is what makes a localization table placeable; a table with no coordinate columns enumerates its rows and its lineage edge is UNMAPPABLE. Read the rows directly from the Parquet store with a datalayer access grant rather than paginating through GraphQL
"""
type TableDataset {
  """The table's axis names, in order. Derived from the coordinate columns"""
  axisNames: [String!]!

  """
  The declared column schema, in order. The COORDINATE columns are the axes of this table's coordinate system
  """
  columns: [TableDatasetColumn!]!

  """
  The coordinate system this table owns. Its axes are the table's coordinate columns (or a single INDEX axis for a pure measurement table)
  """
  coordinateSystem: CoordinateSystem!

  """The task this table was created through, if any"""
  createdThrough: Task

  """The assigner of the creating task, if any"""
  createdThroughBy: User

  """
  The edge from this table's space back into the data it was computed from. UNMAPPABLE for a measurement table (its rows are not positions), a real map for a placeable localization table. Null for a freestanding table. It is the same relation a derived dataset's `derivedFrom` records
  """
  derivedFrom: Transformation
  description: String
  id: ID!
  name: String!

  """How this table was produced: the run, its parameters and its inputs"""
  provenanceMetadata: Any!

  """
  The Parquet store holding the rows. Request an access grant from it and read the Parquet directly
  """
  store: ParquetStore!
}


  affineTransformationViews(filters: AffineTransformationViewFilter, pagination: OffsetPaginationInput): [AffineTransformationView!]!
  channelViews: [ChannelView!]!
  id: ID!
  labelViews: [LabelView!]!
  name: String!

  """Provenance entries for this view collection"""
  provenanceEntries(pagination: OffsetPaginationInput): [ProvenanceEntry!]!
  views: [View!]!
}

"""Input for creating a view collection to group views"""
input ViewCollectionInput {
  """The name of the view collection"""
  name: String!
}

input ViewFilter {
  AND: ViewFilter
  DISTINCT: Boolean
  NOT: ViewFilter
  OR: ViewFilter

  """Filter by list of IDs"""
  ids: [ID!]
  isGlobal: Boolean
}

enum ViewKind {
  ACQUISITION
  AFFINE_TRANSFORMATION
  CHANNEL
  CONTINOUS_SCAN
  DERIVED
  FILE
  HISTOGRAM
  INSTANCE_MASK_VIEW
  LABEL
  LIGHTPATH
  MASK_VIEW
  OPTICS
  REFERENCE
  RGB
  ROI
  SCALE
  TIMEPOINT
  WELL_POSITION
}

"""
A view mapping an image region to a well (row/column) of a multi well plate, so plate-based acquisitions can be traced back to their well.
"""
type WellPositionView implements View {
  """The accessor"""
  accessor: [String!]!
  cMax: Int
  cMin: Int
  column: Int

  """All views of this image"""
  congruentViews(
    """A filter to selected the subset of views"""
    filters: ViewFilter
    types: [ViewKind!]
  ): [View!]!
  id: ID!
  image: Image!
  isGlobal: Boolean!
  row: Int
  tMax: Int
  tMin: Int
  well: MultiWellPlate
  xMax: Int
  xMin: Int
  yMax: Int
  yMin: Int
  zMax: Int
  zMin: Int
}

input WellPositionViewFilter {
  AND: WellPositionViewFilter
  DISTINCT: Boolean
  NOT: WellPositionViewFilter
  OR: WellPositionViewFilter
  column: Int
  id: ID

  """Filter by list of IDs"""
  ids: [ID!]

  """Filter by the image this view belongs to"""
  image: ID

  """Filter by a list of images this view belongs to"""
  images: [ID!]
  isGlobal: Boolean
  row: Int

  """Search by the name of the image this view belongs to"""
  search: String
  well: MultiWellPlateFilter
}

"""
Input for creating a well position view on an existing image, referenced by ID
"""
input WellPositionViewInput {
  """The maximum c (channel) coordinate of the view"""
  cMax: Int = null

  """The minimum c (channel) coordinate of the view"""
  cMin: Int = null

  """The collection this view belongs to"""
  collection: ID = null

  """The column of the well"""
  column: Int = null

  """The ID of the image this view is for"""
  image: ID!

  """The row of the well"""
  row: Int = null

  """The maximum t coordinate of the view"""
  tMax: Int = null

  """The minimum t coordinate of the view"""
  tMin: Int = null

  """The ID of the multi-well plate this view belongs to"""
  well: ID = null

  """The maximum x coordinate of the view"""
  xMax: Int = null

  """The minimum x coordinate of the view"""
  xMin: Int = null

  """The maximum y coordinate of the view"""
  yMax: Int = null

  """The minimum y coordinate of the view"""
  yMin: Int = null

  """The maximum z coordinate of the view"""
  zMax: Int = null

  """The minimum z coordinate of the view"""
  zMin: Int = null
}

"""Temporary S3 credentials for reading a Zarr store."""
type ZarrAccessGrant {
  accessKey: String!
  bucket: String!
  expiresIn: Int!
  key: String!
  path: String!
  region: String!
  secretKey: String!
  sessionToken: String!
  status: String!
  store: String
}

type ZarrStore {
  """Get temporary S3 read credentials for the Zarr object."""
  accessGrant(host: String = null): ZarrAccessGrant!
  attributes: JSON
  bucket: String!
  chunkKeyEncoding: JSON
  chunks: [Int!]!
  codecs: JSON
  dimensionNames: [String]
  dtype: String
  fillValue: JSON!
  id: ID!
  key: String!
  path: String!
  shape: [Int!]!
  storageTransformers: JSON
  version: String
}

input ZarrStoreFilter {
  AND: ZarrStoreFilter
  DISTINCT: Boolean
  NOT: ZarrStoreFilter
  OR: ZarrStoreFilter
  shape: IntFilterLookup
}


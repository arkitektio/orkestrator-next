  name: String!

  """
  The registration edges belonging to this scene's composition -- the edges placing each layer's dataset into the world. This membership set is what `layers.pathToWorld` searches, and for an edge into a shared space it is what places: removing one un-places the layers that relied on it, though the edge itself remains a fact about two coordinate systems. Composing the matrices stays the client's job
  """
  registrations: [Transformation!]!

  """
  The ROIs drawn in a coordinate system this scene can reach. Reachability, not containment: an ROI belongs to a coordinate system, and survives the scene's deletion
  """
  rois: [DataRoi!]!

  """
  The shared space this scene composes its layers over: a world minted for this scene, or an adopted ownerless hub that many scenes can share and that outlives each of them
  """
  worldCoordinateSystem: CoordinateSystem!
}


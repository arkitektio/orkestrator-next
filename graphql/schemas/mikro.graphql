  REPETITIVE
  SINGLE
}

type Query {
  _entities(representations: [_Any!]!): [_Entity]!
  _service: _Service!

  """
  List acquisition views (recording when and by whom images were acquired)
  """
  acquisitionViews: [AcquisitionView!]!

  """Get all active views for a specific image"""
  activeViews(exclude: [ViewKind!], image: ID!, include: [ViewKind!], selector: Selector = null): [View!]!

  """Get a single array dataset by ID"""
  adataset(id: ID!): ADataset!

  """
  List array datasets (N-dimensional arrays with named dimensions and anchored metadata)
  """
  adatasets(filters: ADatasetFilter, ordering: [ADatasetOrder!]! = [], pagination: OffsetPaginationInput): [ADataset!]!

  """
  List affine transformation views (placing images in physical stage space)
  """
  affineTransformationViews(filters: AffineTransformationViewFilter, pagination: OffsetPaginationInput): [AffineTransformationView!]!

  """Get available permissions for a specific identifier"""
  availablePermissions(identifier: String!, search: String = null, values: [ID!] = null): [PermissionOption!]!

  """Get a single camera by ID"""
  camera(
    """The unique identifier of an object"""
    id: ID!
  ): Camera!

  """List channel views (describing the channels of images)"""
  channelViews: [ChannelView!]!

  """Get the channel infos of a specific image"""
  channelsFor(
    filters: ChannelInfoFilter = null

    """The unique identifier of an object"""
    image: ID!
  ): [ChannelInfo!]!

  """List the child datasets of a dataset"""
  children(filters: DatasetChildrenFilter = null, order: ChildrenOrder = null, pagination: ChildrenPaginationInput = null, parent: ID!): [DatasetImageFile!]!

  """List continuous scan views (recording scan directions)"""
  continousScanViews(filters: ContinousScanViewFilter, pagination: OffsetPaginationInput): [ContinousScanView!]!

  """Get a single data array by ID"""
  dataArray(id: ID!): DataArray!

  """List data arrays (the multiscale zarr arrays backing array datasets)"""
  dataArrays(filters: DataArrayFilter, ordering: [DataArrayOrder!]! = [], pagination: OffsetPaginationInput): [DataArray!]!

  """Get a single data ROI by ID"""
  dataRoi(id: ID!): DataRoi!

  """List data ROIs (regions of interest on array datasets)"""

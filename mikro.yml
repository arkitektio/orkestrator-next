overwrite: true
schema:
 "http://jhnnsrs-lab/mikro/schema":
    handleAsSDL: true
documents: "graphql/mikro-next/**/*.graphql"
generates:
  src/renderer/src/mikro-next/api/fragments.ts:
    plugins:
      - "fragment-matcher"
  src/renderer/src/mikro-next/api/graphql.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-react-apollo"
    config:
      withHooks: true
      reactApolloVersion: 3
      apolloReactHooksImportFrom: "@/lib/mikro/funcs"
      scalars:
        # Pint-like quantity scalars: unit-bearing strings ("100 ms", "1 µm").
        # Mapped to named types in ./api/scalars.ts so generated fields read as
        # `Duration`/`Length` rather than `any`. Parse via @/lib/quantities.
        Duration: "@/mikro-next/api/scalars#Duration"
        Length: "@/mikro-next/api/scalars#Length"
        Frequency: "@/mikro-next/api/scalars#Frequency"
        Power: "@/mikro-next/api/scalars#Power"
        # Dimension-free: the value carries whatever unit it has (a MICROTIME
        # bin width is a time, a SPECTRUM one a length). Parse with the
        # dimension resolved from the phasor's axisType.
        GenericQuantity: "@/mikro-next/api/scalars#GenericQuantity"
  src/main/schemas/mikro.ts:
    plugins:
      - "typescript"
      - "typescript-operations"
      - "typescript-graphql-request"
  graphql/schemas/mikro.graphql:
    plugins:
      - schema-ast
